# Ollama LLM server — Fase 0 del API del examen.
# Deploy:
#   scp este archivo al VPS en /root/proyecto_papers/ollama/
#   cd /root/proyecto_papers/ollama && docker compose up -d
#   docker exec ollama ollama pull qwen2.5:1.5b
#
# El container vive en la red stack_web del stack principal, accesible
# desde otros containers como http://ollama:11434. NO publica puerto al host
# (la exposicion externa es via nginx vhost ollama-api.your-vps.example.com
# con API key check).

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    networks:
      - web
    volumes:
      - ./models:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      # 24h mantiene el modelo en RAM y evita cold-starts a costo de ~1.2 GB
      # ocupados permanentemente (qwen2.5:1.5b).
      OLLAMA_KEEP_ALIVE: 24h

networks:
  web:
    external: true
    name: stack_web
