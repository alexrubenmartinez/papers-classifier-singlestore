# Examen UI (Angular SPA) — Fase 5.
# https://papers-ui.your-vps.example.com
# Sin API key (la UI es publica). El proxy interno a papers-api lo hace el nginx
# DENTRO del container papers-ui, que inyecta X-API-Key server-side.

server {
    listen 443 ssl;
    http2 on;
    server_name papers-ui.your-vps.example.com;

    ssl_certificate     /etc/letsencrypt/live/your-vps.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-vps.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    client_max_body_size 32m;

    # SSE: necesita buffering off + read_timeout largo.
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $upstream_ui http://papers-ui:80;
        proxy_pass $upstream_ui;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
