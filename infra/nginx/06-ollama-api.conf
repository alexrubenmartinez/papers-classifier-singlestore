# Ollama HTTP API exposed at https://ollama-api.your-vps.example.com
# Auth: X-API-Key header. Reuses wildcard cert *.your-vps.example.com.
#
# Deploy:
#   scp este archivo al VPS en /root/stack/data/nginx/conf.d/
#   docker exec nginx nginx -t && docker exec nginx nginx -s reload

server {
    listen 443 ssl;
    http2 on;
    server_name ollama-api.your-vps.example.com;

    ssl_certificate     /etc/letsencrypt/live/your-vps.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-vps.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # API key gate. Single shared key for the exam demo.
    set $expected_api_key "REPLACE_API_KEY";
    if ($http_x_api_key != $expected_api_key) {
        return 401 '{"error":"unauthorized","detail":"missing or invalid X-API-Key header"}';
    }

    # Ollama streams tokens via NDJSON / SSE-like chunks. Disable buffering.
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    client_max_body_size 16m;

    # Docker embedded resolver so nginx re-resolves the upstream on container restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $upstream_ollama http://ollama:11434;
        proxy_pass $upstream_ollama;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
    }
}
