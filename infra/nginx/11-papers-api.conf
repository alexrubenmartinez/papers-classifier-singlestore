# Examen API (FastAPI) — Fase 1.
# https://papers-api.your-vps.example.com
# Auth: X-API-Key. Reuses wildcard cert.

server {
    listen 443 ssl;
    http2 on;
    server_name papers-api.your-vps.example.com;

    ssl_certificate     /etc/letsencrypt/live/your-vps.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-vps.example.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;

    # API key gate. Same key as ollama-api for the demo.
    set $expected_api_key "REPLACE_API_KEY";
    if ($http_x_api_key != $expected_api_key) {
        return 401 '{"error":"unauthorized","detail":"missing or invalid X-API-Key header"}';
    }

    # Upload PDFs up to 32 MB.
    client_max_body_size 32m;

    # Disable buffering for SSE (/stream) and Ollama streaming proxied via /chat.
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $upstream_api http://papers-api:8000;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
    }
}
