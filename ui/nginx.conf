server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Docker embedded resolver para re-resolver papers-api si el container se recrea.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Proxy a papers-api inyectando la API key server-side.
    # La UI nunca ve el X-API-Key (queda solo en este nginx).
    # Usamos regex location con captura para strip-ear /api/ del path antes del proxy.
    # Con variable en proxy_pass, nginx no hace el strip automatico.
    location ~ ^/api/(.*)$ {
        set $upstream_api http://papers-api:8000;
        proxy_pass $upstream_api/$1$is_args$args;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-API-Key "REPLACE_API_KEY";

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # SSE / streaming
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Upload PDFs hasta 32 MB
        client_max_body_size 32m;
    }

    # Static cache 1 year
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
