  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0A0C0B" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#F5F1EA" media="(prefers-color-scheme: light)">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,30..100;1,9..144,300..700,30..100&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <script>
    (function() {
      try {
        var stored = localStorage.getItem('theme');
        var prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = stored === 'dark' || (!stored && prefers);
        if (dark) document.documentElement.classList.add('dark');
      } catch (e) {}
    })();
  </script>
</head>
